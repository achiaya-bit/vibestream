services:
  postgres:
    image: postgres:16-alpine
    container_name: vibestream-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-vibestream}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vibestream}
      POSTGRES_DB: ${DB_NAME:-vibestream}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vibestream} -d ${DB_NAME:-vibestream}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Uncomment when adding a Dockerfile for the API service
  # api:
