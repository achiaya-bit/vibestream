services:
  postgres:
    image: postgres:16-alpine
    container_name: vibestream-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-vibestream}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vibestream}
      POSTGRES_DB: ${DB_NAME:-vibestream}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vibestream} -d ${DB_NAME:-vibestream}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: vibestream-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # Uncomment when adding a Dockerfile for the API service
  # api:
  #   build: .
  #   container_name: vibestream-api
  #   restart: unless-stopped
  #   ports:
  #     - "${PORT:-3001}:3001"
  #   env_file:
  #     - .env
  #   environment:
  #     DB_HOST: postgres
  #     DATABASE_URL: postgresql://${DB_USER:-vibestream}:${DB_PASSWORD:-vibestream}@postgres:5432/${DB_NAME:-vibestream}
  #     MINIO_ENDPOINT: minio
  #     MINIO_PORT: 9000
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     minio:
  #       condition: service_healthy

volumes:
  pgdata:
  miniodata:
